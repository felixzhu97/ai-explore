name: Code Review with Review Dog

on:
  pull_request:
    branches: ["main", "java-angular", "feature/**"]

jobs:
  review:
    name: ESLint & Prettier
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: ESLint (Web)
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          eslint_flags: '.'
          level: warning
          reporter: github-pr-review
          workdir: apps/web

      - name: Prettier
        uses: reviewdog/action-reviewdog@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reviewdog_version: v0.20.3
          tool_name: prettier
          level: warning
          fail_on_error: false
          reporter: github-pr-review
        env:
          PRETTIERDOG_IGNORE_UNCHANGED: "true"
        entrypoint: |
          pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}" --log-level warn 2>&1 || true
