server:
  port: 0

spring:
  application:
    name: gateway-test

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

langchain4j:
  chat:
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:test-api-key}
    model-name: ${AI_MODEL:deepseek-v4-flash}
    log-requests: false
    log-responses: false
  embedding:
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:test-api-key}
    model-name: ${EMBEDDING_MODEL:text-embedding-3-small}

qdrant:
  enabled: false

ai:
  agent:
    intent-routing:
      enabled: true
    services:
      rag:
        base-url: http://localhost:9000
        timeout: 5000
      tts:
        base-url: http://localhost:9000
        timeout: 5000
      vision:
        base-url: http://localhost:9000
        timeout: 5000
      media:
        base-url: http://localhost:9000
        timeout: 5000
      text:
        base-url: http://localhost:9000
        timeout: 5000

media:
  stable-diffusion:
    api-url: http://localhost:9000
    default-model: stable-diffusion-xl-base-1.0
    available-models:
      - stable-diffusion-xl-base-1.0
    default-generation:
      width: 512
      height: 512
      steps: 25
      guidance-scale: 7.5
      num-images: 1
    http:
      connect-timeout: 30s
      read-timeout: 5m
      write-timeout: 5m
